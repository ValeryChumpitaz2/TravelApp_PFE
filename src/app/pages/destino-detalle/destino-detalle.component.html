<div class="detalle" *ngIf="destino">

  <div class="hero">
    <h1>{{ destino.nombre }}</h1>
    <p>{{ destino.pais }}</p>
  </div>

  <div class="content">

    <p class="desc">
      {{ destino.descripcion }}
    </p>

    <div class="gallery">
      <img *ngFor="let img of destino.imagenes" [src]="img">
    </div>

    <div class="precio">
      Desde <strong>${{ destino.precio }}</strong>
    </div>

    <button>Reservar ahora</button>

  </div>

</div>
