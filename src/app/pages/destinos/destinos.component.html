<div class="destinos">

  <h1>Destinos disponibles ✈️</h1>

  <div class="grid">

    <div class="card" *ngFor="let d of destinos">

      <img [src]="d.imagen">

      <div class="info">

        <span class="pais">{{ d.pais }}</span>

        <h3>{{ d.nombre }}</h3>

        <p>${{ d.precio }} USD</p>

        <button [routerLink]="['/destinos', d.id]">
          Ver detalle
        </button>

      </div>

    </div>

  </div>

</div>
