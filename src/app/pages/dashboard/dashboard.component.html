<div class="dashboard">

  <h1>📊 Dashboard TravelApp</h1>

  <!-- MÉTRICAS -->
  <div class="cards">

    <div class="card">
      <h2>{{ destinos }}</h2>
      <p>Destinos</p>
    </div>

    <div class="card">
      <h2>{{ paquetes }}</h2>
      <p>Paquetes</p>
    </div>

    <div class="card">
      <h2>{{ ofertas }}</h2>
      <p>Ofertas activas</p>
    </div>

  </div>

  <!-- ACCESOS -->
  <div class="acciones">

    <button routerLink="/destinos">Ver destinos</button>
    <button routerLink="/paquetes">Ver paquetes</button>
    <button routerLink="/contacto">Contacto</button>

  </div>

  <!-- NOTIFICACIONES -->
  <div class="notificaciones">

    <h3>🔔 Notificaciones</h3>

    <div class="lista">

      <div class="notif" *ngFor="let n of notificaciones">
        {{ n }}
      </div>

    </div>

  </div>

</div>
